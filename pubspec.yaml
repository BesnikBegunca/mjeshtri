name: mjeshtri
description: Mjeshtri - desktop app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  firebase_core: ^4.4.0
  flutter:
    sdk: flutter
  intl: ^0.19.0
  path: ^1.9.0
  path_provider: ^2.1.5
  sqflite_common_ffi: ^2.3.4
  pdf: ^3.11.1
  printing: ^5.13.4
  file_selector: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"

  web:
    generate: true
    image_path: "assets/icon/icon.png"

  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 48

  macos:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NotoSans-Regular.ttf
